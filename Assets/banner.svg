<svg viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#74C0FC"/>
      <stop offset="100%" stop-color="#63E6BE"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#74C0FC" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#74C0FC" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#63E6BE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#63E6BE" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD43B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFD43B" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#bg)" rx="10"/>

  <!-- Decorative grid lines -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="45"  x2="900" y2="45"/>
    <line x1="0" y1="90"  x2="900" y2="90"/>
    <line x1="0" y1="135" x2="900" y2="135"/>
  </g>

  <!-- Mini spectrum curve (decorative, right side) -->
  <g transform="translate(580, 20)" opacity="0.25">
    <polyline points="0,100 20,95 40,80 60,50 80,20 100,10 120,20 140,50 160,80 180,95 200,100 220,100 240,100 260,95 280,85 300,100"
              fill="none" stroke="#74C0FC" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="0,100 20,98 40,90 60,70 80,40 100,15 120,8 140,15 160,40 180,70 200,90 220,98 240,100 260,100 280,100 300,100"
              fill="none" stroke="#63E6BE" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4,3"/>
  </g>

  <!-- Mini bar chart (decorative, right) -->
  <g transform="translate(610, 90)" opacity="0.3">
    <rect x="0"  y="40" width="16" height="20" rx="2" fill="url(#bar1)"/>
    <rect x="22" y="20" width="16" height="40" rx="2" fill="url(#bar2)"/>
    <rect x="44" y="30" width="16" height="30" rx="2" fill="url(#bar3)"/>
    <rect x="66" y="5"  width="16" height="55" rx="2" fill="url(#bar4)"/>
    <rect x="88" y="15" width="16" height="45" rx="2" fill="url(#bar1)"/>
  </g>

  <!-- Accent line -->
  <rect x="40" y="32" width="4" height="60" rx="2" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="58" y="65" font-size="32" font-weight="700" fill="#E6EDF3" letter-spacing="-0.5">GC-Bench</text>

  <!-- Subtitle -->
  <text x="58" y="88" font-size="13.5" fill="#8B949E" letter-spacing="0.2">
    ML Benchmark for Silicon Grating Coupler Inverse Design
  </text>

  <!-- Stat pills -->
  <g transform="translate(58, 105)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="110" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="55" y="17" text-anchor="middle" font-size="11" fill="#74C0FC" font-weight="600">500k Samples</text>

    <!-- Pill 2 -->
    <rect x="118" y="0" width="96" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="166" y="17" text-anchor="middle" font-size="11" fill="#63E6BE" font-weight="600">4 Benchmarks</text>

    <!-- Pill 3 -->
    <rect x="222" y="0" width="100" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="272" y="17" text-anchor="middle" font-size="11" fill="#FFD43B" font-weight="600">30+ Models</text>

    <!-- Pill 4 -->
    <rect x="330" y="0" width="116" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="388" y="17" text-anchor="middle" font-size="11" fill="#FF6B6B" font-weight="600">PyTorch · CUDA</text>
  </g>

  <!-- Bottom description -->
  <text x="58" y="162" font-size="11" fill="#484f58">
    Forward · Inverse · Scalar · Spectral · Physics-Informed · Generative · Operator Learning
  </text>
</svg>
